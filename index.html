<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gueslectors | Professional Analytics</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; }
        #dashboard { display: none; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 24px; padding: 24px; max-width: 1400px; margin: 0 auto; }
        .card { background: #1e293b; padding: 24px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .chart-container { position: relative; height: 350px; width: 100%; }
        .table-wrapper { overflow-x: auto; margin-top: 1rem; border-radius: 8px; border: 1px solid #334155; max-height: 400px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; color: #cbd5e1; }
        .data-table th { background: #334155; color: #818cf8; text-align: left; padding: 12px; font-weight: 600; position: sticky; top: 0; }
        .data-table td { padding: 10px; border-top: 1px solid #334155; }
        .data-table tr:hover { background: #262f3f; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        select, input { transition: all 0.2s; }
        select:focus, input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body>

    <header class="flex items-center justify-between px-8 py-4 bg-[#111827] border-b border-slate-700 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="flex items-center justify-center w-10 h-10 bg-indigo-600 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                </svg>
            </div>
            <div class="flex flex-col">
                <span class="text-xl font-bold text-white leading-none">Gueslectors</span>
                <span class="text-[10px] font-medium uppercase tracking-[0.2em] text-slate-400 mt-1">Advanced Analytics</span>
            </div>
        </div>
        <div id="user-status" class="text-sm text-slate-400 bg-slate-800/50 px-3 py-1 rounded-full border border-slate-700">Novikontas Network</div>
    </header>

    <main>
        <div id="login-section" class="flex flex-col items-center justify-center h-[75vh] px-4">
            <h1 class="text-3xl font-bold mb-3 text-white">Access Protected</h1>
            <p class="text-slate-400 mb-8">Please authorize with your corporate Novikontas profile.</p>
            <button id="login-btn" onclick="handleAuthClick()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-12 rounded-xl transition-all shadow-xl shadow-indigo-500/25 active:scale-95 flex items-center gap-3">
                <img src="https://www.google.com/favicon.ico" width="20" alt="G"> Log in with Google
            </button>
        </div>

        <div id="dashboard" class="fade-in">
            
            <div class="card md:col-span-2 flex flex-wrap gap-6 items-end bg-[#1e293b] border-slate-700">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-[10px] uppercase tracking-wider text-slate-500 mb-2 font-bold">Search Category</label>
                    <input type="text" id="search-category" oninput="applyFilters()" placeholder="Напр: NAV COLLEGE" 
                           class="w-full bg-slate-800 border border-slate-600 text-sm rounded-lg p-2.5 outline-none text-white focus:border-indigo-500">
                </div>
                <div class="w-48">
                    <label class="block text-[10px] uppercase tracking-wider text-slate-500 mb-2 font-bold">Time Period</label>
                    <select id="filter-period" onchange="applyFilters()" class="w-full bg-slate-800 border border-slate-600 text-sm rounded-lg p-2.5 outline-none text-white focus:border-indigo-500 cursor-pointer">
                        <option value="all">All Available Data</option>
                        <option value="2025">Year 2025</option>
                        <option value="2026">Year 2026</option>
                        <option value="last12">Previous 12 Months</option>
                    </select>
                </div>
                <div class="text-right pb-3">
                    <span id="data-range-info" class="text-xs text-indigo-400 font-mono font-bold"></span>
                </div>
            </div>

            <div class="card md:col-span-2">
                <h2 class="text-xl mb-6 text-indigo-400 font-bold flex items-center gap-2">
                    <span class="w-3 h-3 bg-indigo-500 rounded-full shadow-[0_0_10px_rgba(99,102,241,0.5)]"></span>
                    Comparative Monthly Analysis
                </h2>
                <div class="chart-container">
                    <canvas id="chartMain"></canvas>
                </div>
            </div>

            <div class="card">
                <h2 class="text-xl mb-6 text-indigo-400 font-bold">Total Trendline</h2>
                <div class="chart-container">
                    <canvas id="chartTrend"></canvas>
                </div>
            </div>

            <div class="card">
                <h2 class="text-xl mb-6 text-indigo-400 font-bold">Data Summary</h2>
                <div id="table-container" class="table-wrapper"></div>
            </div>

        </div>
    </main>

    <script>
        const CLIENT_ID = '962018048971-1362jqjncldrmln6rm01g88v1jj45go9.apps.googleusercontent.com';
        const SPREADSHEET_ID = '15PfvhPDdF_NXsYFaeIBag7BS1N_zE1JyKFfzkgt9FbE';
        const RANGE = 'Лист1!A1:N18'; 

        let tokenClient, accessToken = null, rawData = [];

        function initClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
                callback: async (resp) => { if (resp.access_token) { accessToken = resp.access_token; await loadData(); } },
            });
        }

        function handleAuthClick() { tokenClient ? tokenClient.requestAccessToken() : alert("Loading..."); }

        async function loadData() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';
            try {
                const resp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await resp.json();
                if (data.values) { rawData = data.values; applyFilters(); }
            } catch (err) { console.error(err); }
        }

        function applyFilters() {
            const filterVal = document.getElementById('filter-period').value;
            const searchVal = document.getElementById('search-category').value.toLowerCase();
            const headers = rawData[0];
            const content = rawData.slice(1);
            
            let selectedIdx = [];
            headers.forEach((h, i) => {
                if (i === 0) return;
                const yearMatch = h.match(/\d{4}/);
                const year = yearMatch ? yearMatch[0] : null;
                if (filterVal === "all" || (filterVal === year) || (filterVal === "last12" && i >= headers.length - 12)) {
                    selectedIdx.push(i);
                }
            });

            const filteredRows = content
                .filter(row => row[0] && row[0].toLowerCase().includes(searchVal))
                .map(row => [row[0], ...selectedIdx.map(i => row[i] || "0")]);

            const filteredData = [[headers[0], ...selectedIdx.map(i => headers[i])], ...filteredRows];
            
            document.getElementById('data-range-info').innerText = `Displaying ${selectedIdx.length} months`;
            updateCharts(filteredData);
        }

        let mainChart, trendChart;

        function updateCharts(data) {
            if (mainChart) mainChart.destroy();
            if (trendChart) trendChart.destroy();

            const months = data[0].slice(1);
            const cats = data.slice(1).filter(r => r[0] !== 'TOTAL').map(r => r[0]);

            const barDatasets = months.map((m, i) => ({
                label: m,
                data: data.slice(1).filter(r => r[0] !== 'TOTAL').map(r => parseFloat(r[i+1].toString().replace(',','.')) || 0),
                backgroundColor: `hsl(${220 + (i * 20)}, 65%, 50%)`,
                borderRadius: 4
            }));

            mainChart = new Chart(document.getElementById('chartMain'), {
                type: 'bar',
                data: { labels: cats, datasets: barDatasets },
                options: { responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } },
                    scales: { y: { grid: { color: '#334155' }, ticks: { color: '#64748b' } }, x: { grid: { display: false }, ticks: { color: '#94a3b8' } } }
                }
            });

            const totalRow = data.find(r => r[0] === 'TOTAL') || data[data.length - 1];
            trendChart = new Chart(document.getElementById('chartTrend'), {
                type: 'line',
                data: { labels: months, datasets: [{ label: 'Trend', data: totalRow.slice(1).map(v => parseFloat(v.toString().replace(',','.')) || 0), borderColor: '#6366f1', fill: true, backgroundColor: 'rgba(99, 102, 241, 0.1)', tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: '#334155' } }, x: { ticks: { color: '#94a3b8' } } } }
            });

            renderTable(data);
        }

        function renderTable(data) {
            let html = '<table class="data-table"><thead><tr>' + data[0].map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
            html += data.slice(1).map(row => '<tr>' + row.map(c => `<td>${c}</td>`).join('') + '</tr>').join('') + '</tbody></table>';
            document.getElementById('table-container').innerHTML = html;
        }
    </script>
    <script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>
</body>
</html>
