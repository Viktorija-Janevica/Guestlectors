<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gueslectors | Internal Data Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f1f5f9; 
            margin: 0; 
        }
        
        /* Сетка дашборда - появляется только после входа */
        #dashboard { 
            display: none; 
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); 
            gap: 24px; 
            padding: 24px; 
            max-width: 1400px;
            margin: 0 auto;
        }

        .card { 
            background: #1e293b; 
            padding: 24px; 
            border-radius: 16px; 
            border: 1px solid #334155; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
        }

        .chart-container { 
            position: relative; 
            height: 350px; 
            width: 100%; 
        }
        
        /* Таблицы в стиле Dark Mode */
        .table-wrapper { 
            overflow-x: auto; 
            margin-top: 1rem; 
            border-radius: 8px; 
            border: 1px solid #334155; 
        }
        .data-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.85rem; 
            color: #cbd5e1; 
        }
        .data-table th { 
            background: #334155; 
            color: #818cf8; 
            text-align: left; 
            padding: 12px; 
            font-weight: 600; 
            position: sticky;
            top: 0;
        }
        .data-table td { 
            padding: 10px; 
            border-top: 1px solid #334155; 
        }
        .data-table tr:hover { 
            background: #262f3f; 
        }

        /* Анимация появления */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header class="flex items-center justify-between px-8 py-4 bg-[#111827] border-b border-slate-700 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="flex items-center justify-center w-10 h-10 bg-indigo-600 rounded-lg shadow-indigo-500/20 shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                </svg>
            </div>
            <div class="flex flex-col">
                <span class="text-xl font-bold tracking-tight text-white leading-none">Gueslectors</span>
                <span class="text-[10px] font-medium uppercase tracking-[0.2em] text-slate-400 mt-1">Internal Data System</span>
            </div>
        </div>
        <div id="user-status" class="text-sm text-slate-400 font-medium bg-slate-800/50 px-3 py-1 rounded-full border border-slate-700">
            Novikontas Network
        </div>
    </header>

    <main>
        <div id="login-section" class="flex flex-col items-center justify-center h-[75vh] px-4">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold mb-3 text-white">Access Protected</h1>
                <p class="text-slate-400">Please authorize with your corporate Novikontas profile to view analytics.</p>
            </div>
            <button id="login-btn" onclick="handleAuthClick()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-12 rounded-xl transition-all shadow-xl shadow-indigo-500/25 active:scale-95 flex items-center gap-3">
                <img src="https://www.google.com/favicon.ico" width="20" alt="G">
                Log in with Google
            </button>
        </div>

        <div id="dashboard" class="dashboard-grid fade-in">
            
            <div class="card md:col-span-2">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl text-indigo-400 font-bold flex items-center gap-2">
                        <span class="w-3 h-3 bg-indigo-500 rounded-full shadow-[0_0_10px_rgba(99,102,241,0.5)]"></span>
                        Monthly Category Analytics
                    </h2>
                </div>
                <div class="chart-container">
                    <canvas id="chartMain"></canvas>
                </div>
            </div>

            <div class="card">
                <h2 class="text-xl mb-6 text-indigo-400 font-bold">Overall Performance (TOTAL)</h2>
                <div class="chart-container">
                    <canvas id="chartTrend"></canvas>
                </div>
            </div>

            <div class="card">
                <h2 class="text-xl mb-6 text-indigo-400 font-bold">Data Summary</h2>
                <div id="table-container" class="table-wrapper">
                    <p class="p-4 text-slate-500">Загрузка данных...</p>
                </div>
            </div>

        </div>
    </main>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const CLIENT_ID = '962018048971-1362jqjncldrmln6rm01g88v1jj45go9.apps.googleusercontent.com';
        const SPREADSHEET_ID = '15PfvhPDdF_NXsYFaeIBag7BS1N_zE1JyKFfzkgt9FbE';
        const RANGE = 'Лист1!A1:N18'; 

        let tokenClient;
        let accessToken = null;

        // Инициализация при загрузке
        function initClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
                callback: async (tokenResponse) => {
                    if (tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        await startApp();
                    }
                },
            });
        }

        // Обработка клика по кнопке
        function handleAuthClick() {
            if (tokenClient) {
                tokenClient.requestAccessToken();
            } else {
                alert("Google Auth is still loading. Please wait a second.");
            }
        }

        // Запуск дашборда
        async function startApp() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';
            
            try {
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                
                if (data.values) {
                    processAndRender(data.values);
                } else {
                    console.error("No data found in sheet.");
                }
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function processAndRender(values) {
            renderBarChart('chartMain', values);
            renderTrendChart('chartTrend', values);
            renderTable('table-container', values);
        }

        // 1. Группированный столбчатый график
        function renderBarChart(id, values) {
            const ctx = document.getElementById(id).getContext('2d');
            const months = values[0].slice(1); // Заголовки (месяцы)
            const rows = values.slice(1, -1); // Все строки кроме TOTAL

            const datasets = months.map((month, i) => ({
                label: month,
                data: rows.map(row => {
                    let rawValue = row[i+1] || "0";
                    return parseFloat(rawValue.toString().replace(',', '.')) || 0;
                }),
                backgroundColor: `hsl(${220 + (i * 20)}, 65%, 50%)`,
                borderRadius: 4,
                borderWidth: 0
            }));

            new Chart(ctx, {
                type: 'bar',
                data: { labels: rows.map(r => r[0]), datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 20, font: { size: 11 } } }
                    },
                    scales: {
                        y: { grid: { color: '#334155' }, ticks: { color: '#64748b' }, beginAtZero: true },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        // 2. Линейный график (TOTAL)
        function renderTrendChart(id, values) {
            const ctx = document.getElementById(id).getContext('2d');
            const months = values[0].slice(1);
            const totalRow = values[values.length - 1].slice(1);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'Total Value',
                        data: totalRow.map(v => parseFloat(v.toString().replace(',', '.')) || 0),
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 4,
                        pointRadius: 4,
                        pointBackgroundColor: '#6366f1'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { grid: { color: '#334155' }, ticks: { color: '#64748b' } },
                        x: { ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        // 3. Таблица
        function renderTable(id, values) {
            let html = '<table class="data-table"><thead><tr>';
            values[0].forEach(h => html += `<th>${h}</th>`);
            html += '</tr></thead><tbody>';
            values.slice(1).forEach(row => {
                html += '<tr>';
                row.forEach(cell => html += `<td>${cell || '-'}</td>`);
                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById(id).innerHTML = html;
        }
    </script>

    <script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>

</body>
</html>
