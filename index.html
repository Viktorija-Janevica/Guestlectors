<style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; margin: 0; }
    /* Сетка для карточек */
    .dashboard-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); 
        gap: 24px; 
        padding: 20px;
        display: none; /* Скрыто до логина */
    }
    .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
    .chart-container { position: relative; height: 350px; width: 100%; }
    
    /* Стили для таблиц */
    .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; color: #cbd5e1; }
    .data-table th { background: #334155; color: #818cf8; text-align: left; padding: 10px; border: 1px solid #475569; }
    .data-table td { padding: 8px; border: 1px solid #475569; }
    .data-table tr:hover { background: #2d3748; }
</style>

<header class="flex items-center justify-between px-8 py-4 bg-[#111827] border-b border-slate-700 shadow-lg">
    <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-10 h-10 bg-indigo-600 rounded-lg shadow-indigo-500/20 shadow-md">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
            </svg>
        </div>
        <div class="flex flex-col">
            <span class="text-xl font-bold tracking-tight text-white leading-none">Gueslectors</span>
            <span class="text-[10px] font-medium uppercase tracking-[0.2em] text-slate-400 mt-1">Internal Use</span>
        </div>
    </div>
</header>

<main class="p-6">
    <div id="login-section" class="login-container flex flex-col items-center justify-center h-[60vh]">
        <h1 class="text-2xl font-semibold mb-6 text-slate-200">Please authorize with Novikontas profile</h1>
        <button id="login-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-8 rounded-lg transition-all shadow-lg shadow-indigo-500/20">
            Log in with Google
        </button>
    </div>

    <div id="dashboard" class="dashboard-grid">
        
        <div class="card lg:col-span-2">
            <h2 class="text-xl mb-4 text-indigo-400 font-bold">Детальная статистика по месяцам</h2>
            <div class="chart-container">
                <canvas id="chartMain"></canvas>
            </div>
        </div>

        <div class="card">
            <h2 class="text-xl mb-4 text-indigo-400 font-bold">Динамика TOTAL</h2>
            <div class="chart-container">
                <canvas id="chartTrend"></canvas>
            </div>
        </div>

        <div class="card">
            <h2 class="text-xl mb-4 text-indigo-400 font-bold">Сводная таблица</h2>
            <div id="table-container" class="overflow-x-auto">
                </div>
        </div>

    </div>
</main>

<script>
    const CLIENT_ID = '962018048971-1362jqjncldrmln6rm01g88v1jj45go9.apps.googleusercontent.com';
    const SPREADSHEET_ID = '15PfvhPDdF_NXsYFaeIBag7BS1N_zE1JyKFfzkgt9FbE';
    
    let tokenClient;
    let accessToken = null;

    function initClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
            callback: (tokenResponse) => {
                if (tokenResponse.access_token) {
                    accessToken = tokenResponse.access_token;
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'grid';
                    runDashboard();
                }
            },
        });
    }

    document.getElementById('login-btn').onclick = () => tokenClient.requestAccessToken();

    // Универсальная функция загрузки
    async function fetchSheetData(range) {
        const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${range}`, {
            headers: { 'Authorization': `Bearer ${accessToken}` }
        });
        const data = await response.json();
        return data.values;
    }

    async function runDashboard() {
        // 1. Загружаем данные (Например, A1:N18 для большого графика)
        const mainData = await fetchSheetData('Лист1!A1:N17');
        
        // Рисуем группированные столбцы
        renderBarChart('chartMain', mainData);
        
        // Рисуем линию тренда (по строке TOTAL, она обычно последняя)
        renderTrendChart('chartTrend', mainData);

        // Рисуем таблицу
        renderTable('table-container', mainData);
    }

    // --- ФУНКЦИИ ОТРИСОВКИ ---

    function renderBarChart(canvasId, values) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        const months = values[0].slice(1);
        const categories = values.slice(1, -1).map(row => row[0]); // Без последней строки (TOTAL)

        const datasets = months.map((month, i) => ({
            label: month,
            data: values.slice(1, -1).map(row => parseFloat(row[i+1]?.replace(',', '.')) || 0),
            backgroundColor: `hsl(${i * 30}, 60%, 50%)`,
            borderRadius: 5
        }));

        new Chart(ctx, {
            type: 'bar',
            data: { labels: categories, datasets: datasets },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', boxWidth: 10 } } },
                scales: {
                    y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                }
            }
        });
    }

    function renderTrendChart(canvasId, values) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        const months = values[0].slice(1);
        const totalRow = values[values.length - 1].slice(1); // Берем строку TOTAL

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: months,
                datasets: [{
                    label: 'Суммарно по месяцам',
                    data: totalRow.map(v => parseFloat(v.replace(',', '.')) || 0),
                    borderColor: '#6366f1',
                    backgroundColor: 'rgba(99, 102, 241, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    x: { ticks: { color: '#94a3b8' } }
                }
            }
        });
    }

    function renderTable(containerId, values) {
        let html = '<table class="data-table"><thead><tr>';
        values[0].forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead><tbody>';
        values.slice(1).forEach(row => {
            html += '<tr>';
            row.forEach(cell => html += `<td>${cell}</td>`);
            html += '</tr>';
        });
        html += '</tbody></table>';
        document.getElementById(containerId).innerHTML = html;
    }
</script>
