<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gueslectors | Internal Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; margin: 0; }
        /* Сетка дашборда */
        .dashboard-grid { 
            display: none; /* Скрыто до входа */
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); 
            gap: 24px; 
            padding: 24px; 
            max-width: 1400px;
            margin: 0 auto;
        }
        .card { background: #1e293b; padding: 24px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .chart-container { position: relative; height: 350px; width: 100%; }
        
        /* Таблицы */
        .table-wrapper { overflow-x: auto; margin-top: 1rem; border-radius: 8px; border: 1px solid #334155; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; color: #cbd5e1; }
        .data-table th { background: #334155; color: #818cf8; text-align: left; padding: 12px; font-weight: 600; }
        .data-table td { padding: 10px; border-top: 1px solid #334155; }
        .data-table tr:hover { background: #262f3f; }
    </style>
</head>
<body>

                </svg>
            </div>
            <div class="flex flex-col">
                <span class="text-xl font-bold tracking-tight text-white leading-none">Gueslectors</span>
                <span class="text-[10px] font-medium uppercase tracking-[0.2em] text-slate-400 mt-1">Internal Use</span>
            </div>
        </div>
        <div id="user-indicator" class="text-sm text-slate-400 font-medium">Novikontas Profile</div>
    </header>

            <button id="login-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-10 rounded-lg transition-all shadow-lg shadow-indigo-500/20 active:scale-95">
                Log in with Google
            </button>
        </div>

        <div id="dashboard" class="dashboard-grid">

                <h2 class="text-xl mb-6 text-indigo-400 font-bold flex items-center gap-2">
                    <span class="w-2 h-2 bg-indigo-400 rounded-full"></span>
                    Детальная аналитика по категориям
                </h2>
                <div class="chart-container">
                    <canvas id="chartMain"></canvas>
                </div>
            </div>

            <div class="card">
                <h2 class="text-xl mb-6 text-indigo-400 font-bold">Общий тренд (TOTAL)</h2>
                <div class="chart-container">
                    <canvas id="chartTrend"></canvas>
                </div>
            </div>

            <div class="card">

                <div id="table-container" class="table-wrapper">
                    </div>
            </div>

        </div>
    </main>

        function initClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,

                    if (tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        showDashboard();
                    }
                },
            });
        }
