<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Приватный график компании</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px; }
        #chart-wrapper { width: 80%; margin: 20px auto; display: none; }
        .btn-login { background: #4285F4; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn-login:hover { background: #357ae8; }
    </style>
</head>
<body>

    <h1>График данных (Только для сотрудников)</h1>
    
    <button id="login-btn" class="btn-login">Войти с помощью Google</button>

    <div id="chart-wrapper">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        // --- НАСТРОЙКИ ---
        const CLIENT_ID = 'https://962018048971-1362jqjncldrmln6rm01g88v1jj45go9.apps.googleusercontent.com';
        const SPREADSHEET_ID = '15PfvhPDdF_NXsYFaeIBag7BS1N_zE1JyKFfzkgt9FbE';
        const RANGE = 'Лист1!A1:L17'; // Убедись, что название листа совпадает
        // -----------------

        let tokenClient;
        let accessToken = null;

        function initClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
                callback: (tokenResponse) => {
                    if (tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        document.getElementById('login-btn').style.display = 'none';
                        document.getElementById('chart-wrapper').style.display = 'block';
                        fetchData();
                    }
                },
            });
        }

        document.getElementById('login-btn').onclick = () => {
            tokenClient.requestAccessToken();
        };

        async function fetchData() {
            try {
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                renderChart(data.values);
            } catch (err) {
                alert('Ошибка при получении данных. Проверьте доступ к таблице.');
            }
        }

        function renderChart(dataRows) {
            const ctx = document.getElementById('myChart').getContext('2d');
            const labels = dataRows.map(row => row[0]);
            const values = dataRows.map(row => parseFloat(row[1]));

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Показатели',
                        data: values,
                        borderColor: '#4285F4',
                        backgroundColor: 'rgba(66, 133, 244, 0.1)',
                        fill: true
                    }]
                }
            });
        }
    </script>
<script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>
</body>
</html>
