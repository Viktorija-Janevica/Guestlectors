<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gueslectors | Monthly report</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
       <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; }
        #dashboard-container { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
        .card { background: #1e293b; padding: 24px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .chart-container { position: relative; height: 320px; width: 100%; }
        .table-wrapper { overflow-x: auto; margin-top: 1rem; border-radius: 8px; border: 1px solid #334155; max-height: 300px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; color: #cbd5e1; }
        
        /* Базовый стиль заголовков таблиц */
        .data-table th { background: #334155; text-align: left; padding: 10px; font-weight: 600; position: sticky; top: 0; }
        
        /* Цвета для таблицы Expenses (Голубой) */
        #table-expenses-container th { color: #818cf8; border-bottom: 2px solid #6366f1; }
        #table-expenses-container td:first-child { color: #a5b4fc; font-weight: 600; } /* Подсветка названий отделов */

        /* Цвета для таблицы Payout (Зеленый) */
        #table-payout-container th { color: #34d399; border-bottom: 2px solid #10b981; }
        #table-payout-container td:first-child { color: #6ee7b7; font-weight: 600; } /* Подсветка названий отделов */

        .data-table td { padding: 8px; border-top: 1px solid #334155; }
        .data-table tr:hover { background: #262f3f; }
        
        .tab-btn { padding: 12px 24px; font-weight: 600; color: #94a3b8; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: #6366f1; border-bottom-color: #6366f1; background: rgba(99, 102, 241, 0.05); }
        
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header class="flex items-center justify-between px-8 py-4 bg-[#0f172a] border-b border-slate-700 shadow-lg">
    <div class="flex items-center gap-3">
        <img src="NoAca_logo_Symbolwhite.png" alt="Logo" class="h-16 w-auto object-contain">
        <div class="flex flex-col">
            <span class="text-xl font-bold text-white leading-none">Gueslectors</span>
            <span class="text-[10px] font-medium uppercase tracking-[0.2em] text-slate-400 mt-1">Monthly report</span>
        </div>
    </div>
</header>

    <main>
        <div id="login-section" class="flex flex-col items-center justify-center h-[75vh] px-4">
            <h1 class="text-3xl font-bold mb-8 text-white text-center">Authorization is possible only with a Novikontas email address.</h1>
            <button id="login-btn" onclick="handleAuthClick()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-12 rounded-xl transition-all shadow-xl shadow-indigo-500/25 active:scale-95 flex items-center gap-3">
                <img src="https://www.google.com/favicon.ico" width="20" alt="G"> Log in with Google
            </button>
        </div>

        <div id="dashboard-container" class="fade-in space-y-12">
            
            <div class="flex justify-between items-center border-b border-slate-700 px-4">
                <div class="flex gap-4">
                    <button id="tab-std-btn" class="tab-btn active" onclick="switchTab('standard')">Department Statistics</button>
                    <button id="tab-det-btn" class="tab-btn" onclick="switchTab('detailed')">Detailed Statistics</button>
                </div>
                <button onclick="loadAllData()" class="text-xs bg-slate-800 hover:bg-slate-700 text-indigo-400 py-1.5 px-4 rounded-lg border border-slate-600 transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                    Refresh All Data
                </button>
            </div>

            <div class="card md:col-span-2 space-y-4 bg-[#1e293b]/50 border-indigo-500/30">
                <div class="flex flex-wrap gap-6 items-end">
                    <div class="flex-1 min-w-[200px]">
                        <label class="block text-[10px] uppercase tracking-wider text-slate-500 mb-2 font-bold font-bold">Search Category</label>
                        <input type="text" id="search-global" oninput="applyFilters()" placeholder="Example: NAV" class="w-full bg-slate-800 border border-slate-600 text-sm rounded-lg p-2 outline-none text-white focus:border-indigo-500">
                    </div>
                    <div class="w-48">
                        <label class="block text-[10px] uppercase tracking-wider text-slate-500 mb-2 font-bold font-bold">Time Period</label>
                        <select id="filter-period" onchange="applyFilters()" class="w-full bg-slate-800 border border-slate-600 text-sm rounded-lg p-2 outline-none text-white focus:border-indigo-500 cursor-pointer">
                            <option value="last12" selected>Last 12 Months</option>
                            <option value="all">All Data</option>
                            <option value="2025">2025</option>
                            <option value="2026">2026</option>
                        </select>
                    </div>
                </div>
            </div>

            <section id="section-expenses" class="space-y-6">
                <div class="card md:col-span-2 border-l-4 border-indigo-500">
                    <h2 class="text-2xl font-bold text-white flex items-center gap-3">
                        <span class="p-2 bg-indigo-500/20 rounded-lg text-indigo-400">
                             <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        </span>
                        Expenses
                    </h2>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="card md:col-span-2"><div class="chart-container"><canvas id="chartExpensesMain"></canvas></div></div>
                    <div class="card"><h3 class="text-indigo-400 font-bold mb-4 text-xs uppercase tracking-widest">Total Expenses</h3><div class="chart-container"><canvas id="chartExpensesTrend"></canvas></div></div>
                    <div class="card"><h3 class="text-indigo-400 font-bold mb-4 text-xs uppercase tracking-widest">Data Table</h3><div id="table-expenses-container" class="table-wrapper"></div></div>
                </div>
            </section>

            <section id="section-payout" class="space-y-6 pb-12">
                <div class="card md:col-span-2 border-l-4 border-emerald-500">
                    <h2 class="text-2xl font-bold text-white flex items-center gap-3">
                        <span class="p-2 bg-emerald-500/20 rounded-lg text-emerald-400">
                             <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 15 2 2 4-4"/><rect width="20" height="14" x="2" y="6" rx="2"/><path d="M12 10h.01"/></svg>
                        </span>
                        Payout
                    </h2>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="card md:col-span-2"><div class="chart-container"><canvas id="chartPayoutMain"></canvas></div></div>
                    <div class="card"><h3 class="text-emerald-400 font-bold mb-4 text-xs uppercase tracking-widest">Total Payout</h3><div class="chart-container"><canvas id="chartPayoutTrend"></canvas></div></div>
                    <div class="card"><h3 class="text-emerald-400 font-bold mb-4 text-xs uppercase tracking-widest">Data Table</h3><div id="table-payout-container" class="table-wrapper"></div></div>
                </div>
            </section>

        </div>
    </main>

    <script>
        const CLIENT_ID = '962018048971-1362jqjncldrmln6rm01g88v1jj45go9.apps.googleusercontent.com';
        const SPREADSHEET_ID = '15PfvhPDdF_NXsYFaeIBag7BS1N_zE1JyKFfzkgt9FbE';
        
        let tokenClient, accessToken = null;
        let activeTab = 'standard'; 
        let rawData = { exp_std: [], exp_det: [], pay_std: [], pay_det: [] };
        let charts = {};

        function initClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
                callback: async (resp) => { if (resp.access_token) { accessToken = resp.access_token; await loadAllData(); } },
            });
        }

        function handleAuthClick() { tokenClient ? tokenClient.requestAccessToken() : alert("Loading API..."); }

        async function loadAllData() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-container').style.display = 'block';
            
            try {
                const [r1, r2, r3, r4] = await Promise.all([
                    fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Лист2!A1:AB9`, { headers: { 'Authorization': `Bearer ${accessToken}` } }),
                    fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Лист1!A1:AB18`, { headers: { 'Authorization': `Bearer ${accessToken}` } }),
                    fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Лист4!A1:AB9`, { headers: { 'Authorization': `Bearer ${accessToken}` } }),
                    fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Лист3!A1:AB18`, { headers: { 'Authorization': `Bearer ${accessToken}` } })
                ]);
                
                rawData.exp_std = (await r1.json()).values || [];
                rawData.exp_det = (await r2.json()).values || [];
                rawData.pay_std = (await r3.json()).values || [];
                rawData.pay_det = (await r4.json()).values || [];
                
                switchTab(activeTab);
            } catch (err) { console.error(err); }
        }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('tab-std-btn').className = `tab-btn ${tab === 'standard' ? 'active' : ''}`;
            document.getElementById('tab-det-btn').className = `tab-btn ${tab === 'detailed' ? 'active' : ''}`;
            
            // Устанавливаем фильтр по умолчанию
            document.getElementById('filter-period').value = 'last12';
            applyFilters();
        }

        function applyFilters() {
            const period = document.getElementById('filter-period').value;
            const search = document.getElementById('search-global').value.toLowerCase();

            const expData = activeTab === 'standard' ? rawData.exp_std : rawData.exp_det;
            const filteredExp = processData(expData, period, search);
            renderSection(filteredExp, 'chartExpensesMain', 'chartExpensesTrend', 'table-expenses-container', '#6366f1');

            const payData = activeTab === 'standard' ? rawData.pay_std : rawData.pay_det;
            const filteredPay = processData(payData, period, search);
            renderSection(filteredPay, 'chartPayoutMain', 'chartPayoutTrend', 'table-payout-container', '#10b981');
        }

        function processData(data, period, search) {
            if (!data || data.length === 0) return [];
            const headers = data[0];
            const content = data.slice(1);
            
            let selectedIdx = [];
            headers.forEach((h, i) => {
                if (i === 0) return;
                const yearMatch = h.match(/\d{4}/);
                const year = yearMatch ? yearMatch[0] : null;

                if (period === "all") {
                    selectedIdx.push(i);
                } else if (period === "last12") {
                    // Всегда берем последние 12 колонок данных (если они есть)
                    const totalCols = headers.length - 1;
                    const startIdx = Math.max(1, totalCols - 11);
                    if (i >= startIdx) selectedIdx.push(i);
                } else if (period === year) {
                    selectedIdx.push(i);
                }
            });

            const rows = content
                .filter(row => row[0] && row[0].toLowerCase().includes(search))
                .map(row => [row[0], ...selectedIdx.map(i => row[i] || "0")]);

            return [[headers[0], ...selectedIdx.map(i => headers[i])], ...rows];
        }

       function renderSection(data, barId, trendId, tableId, color) {
            if (charts[barId]) charts[barId].destroy();
            if (charts[trendId]) charts[trendId].destroy();

            const months = data[0].slice(1);
            const contentNoTotal = data.slice(1).filter(r => !r[0].toString().toUpperCase().includes('TOTAL'));
            const cats = contentNoTotal.map(r => r[0]);

            // Общие настройки шрифта для осей
            const axisFontSettings = {
                family: "'Inter', sans-serif",
                size: 12,
                weight: '600'
            };

            // Bar Chart
            charts[barId] = new Chart(document.getElementById(barId), {
                type: 'bar',
                data: {
                    labels: cats,
                    datasets: months.map((m, i) => ({
                        label: m,
                        data: contentNoTotal.map(r => parseFloat(r[i+1].toString().replace(',','.')) || 0),
                        backgroundColor: `hsla(${color === '#10b981' ? 160 : 230}, 60%, ${45 + (i * 4)}%, 0.8)`,
                        borderRadius: 4
                    }))
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { 
                            position: 'bottom', 
                            labels: { color: '#ffffff', font: axisFontSettings } 
                        } 
                    },
                    scales: {
                        y: {
                            grid: { color: '#334155' },
                            ticks: { color: '#ffffff', font: axisFontSettings } // Чисто белый текст для оси Y
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#ffffff', font: axisFontSettings } // Чисто белый текст для оси X
                        }
                    }
                }
            });

            // Trend Chart
            const totalRow = data.find(r => r[0].toString().toUpperCase().includes('TOTAL')) || data[data.length - 1];
            charts[trendId] = new Chart(document.getElementById(trendId), {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'Total Sum',
                        data: totalRow.slice(1).map(v => parseFloat(v.toString().replace(',','.')) || 0),
                        borderColor: color,
                        backgroundColor: color + '22',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: {
                        legend: { labels: { color: '#ffffff', font: axisFontSettings } }
                    },
                    scales: { 
                        y: { 
                            grid: { color: '#334155' },
                            ticks: { color: '#ffffff', font: axisFontSettings } // Чисто белый текст для оси Y
                        },
                        x: {
                            ticks: { color: '#ffffff', font: axisFontSettings } // Чисто белый текст для оси X
                        }
                    } 
                }
            });

            let html = '<table class="data-table"><thead><tr>' + data[0].map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
            html += data.slice(1).map(row => '<tr>' + row.map(c => `<td>${c}</td>`).join('') + '</tr>').join('') + '</tbody></table>';
            document.getElementById(tableId).innerHTML = html;
        }

            const totalRow = data.find(r => r[0].toString().toUpperCase().includes('TOTAL')) || data[data.length - 1];
            charts[trendId] = new Chart(document.getElementById(trendId), {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'Total Sum',
                        data: totalRow.slice(1).map(v => parseFloat(v.toString().replace(',','.')) || 0),
                        borderColor: color,
                        backgroundColor: color + '22',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: '#334155' } } } }
            });

            let html = '<table class="data-table"><thead><tr>' + data[0].map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
            html += data.slice(1).map(row => '<tr>' + row.map(c => `<td>${c}</td>`).join('') + '</tr>').join('') + '</tbody></table>';
            document.getElementById(tableId).innerHTML = html;
        }
    </script>
    <script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>
</body>
</html>
